<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Nanumi - 근로 배정 정보</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">나누미 1.0</div>
        <ul class="sidebar-menu">
            <li class="sidebar-item parent">석곡농협 ▾</li>
            <li class="sidebar-item" onclick="location.href='index.html'">근로배정현황</li>
            <li class="sidebar-item" onclick="location.href='assign-work.html'">근로배정하기</li>
            <li class="sidebar-item" onclick="location.href='calendar.html'">근로배정달력</li>
            <li class="sidebar-item selected" onclick="location.href='assign-info.html'">근로배정정보</li>
            <li class="sidebar-item parent">기본정보관리</li>
            <li class="sidebar-item" onclick="location.href='center-info.html'">센터정보</li>
            <li class="sidebar-item" onclick="location.href='member-list.html'">회원관리</li>
            <li class="sidebar-item" onclick="location.href='worker-list.html'">근로자정보</li>
            <li class="sidebar-item" onclick="location.href='farmer-list.html'">농가정보</li>
            <li class="sidebar-item parent" style="margin-top: 15px;">설정 ▾</li>
            <li class="sidebar-item" onclick="location.href='setting-msg.html'" style="padding-left: 30px;">문자설정</li>
            <li class="sidebar-item" onclick="location.href='setting-cost.html'" style="padding-left: 30px;">비용설정</li>
            <li class="sidebar-item" onclick="location.href='setting-category.html'" style="padding-left: 30px;">카테고리설정</li>
        </ul>
    </aside>

    <!-- Main Content -->
    <section class="main-area">
        <header class="top-header">
            <div class="breadcrumb">홈 > 근로배정정보</div>
            <div class="header-right">
                <span>관리자님 환영합니다</span>
            </div>
        </header>

        <div class="content-container">
            <div class="content-title">
                📊 근로 배정 이력 조회
            </div>

            <!-- Search Filter -->
            <div class="search-section" style="background: white; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(4, 1fr) auto; gap: 10px; align-items: end;">
                <div>
                    <label style="display:block; font-size:12px; margin-bottom:5px; font-weight:700;">기간 선택</label>
                    <input type="date" style="padding:10px; border:1px solid #ddd; border-radius:6px; width:100%;">
                </div>
                <div>
                    <label style="display:block; font-size:12px; margin-bottom:5px; font-weight:700;">농가명</label>
                    <input type="text" placeholder="농가 입력" style="padding:10px; border:1px solid #ddd; border-radius:6px; width:100%;">
                </div>
                <div>
                    <label style="display:block; font-size:12px; margin-bottom:5px; font-weight:700;">근로자명</label>
                    <input type="text" placeholder="근로자 입력" style="padding:10px; border:1px solid #ddd; border-radius:6px; width:100%;">
                </div>
                <div>
                    <label style="display:block; font-size:12px; margin-bottom:5px; font-weight:700;">정산 상태</label>
                    <select style="padding:10px; border:1px solid #ddd; border-radius:6px; width:100%;">
                        <option>전체</option>
                        <option>정산 완료</option>
                        <option>미정산</option>
                    </select>
                </div>
                <div style="display:flex; gap:5px;">
                    <button style="background: var(--btn-blue); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer;">조회</button>
                    <button style="background: #475569; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer;">Excel 출력</button>
                </div>
            </div>

            <!-- Data Table -->
            <div class="table-container" style="background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead style="background: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                        <tr>
                            <th style="padding: 15px; font-size: 13px;">배정일자</th>
                            <th style="padding: 15px; font-size: 13px;">배정농가</th>
                            <th style="padding: 15px; font-size: 13px;">농장주</th>
                            <th style="padding: 15px; font-size: 13px;">배정근로자</th>
                            <th style="padding: 15px; font-size: 13px;">근무시간</th>
                            <th style="padding: 15px; font-size: 13px;">정산액</th>
                            <th style="padding: 15px; font-size: 13px;">상태</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="border-bottom: 1px solid #f1f5f9;">
                            <td style="padding: 15px;">2024-04-01</td>
                            <td style="padding: 15px; font-weight:700;">풍년농장</td>
                            <td style="padding: 15px;">김곡성</td>
                            <td style="padding: 15px;"><div class="badge male" style="height:28px;">지엥</div></td>
                            <td style="padding: 15px;">08:00 ~ 17:00</td>
                            <td style="padding: 15px;">90,000원</td>
                            <td style="padding: 15px;"><span class="status-pill pill-blue">지급완료</span></td>
                        </tr>
                        <!-- 추가 행... -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
